<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Student</title><link rel="stylesheet" href="style.css"></head>
<body>
<h1>Vocabulary Quiz</h1>
<div class="box">
<input id="room" placeholder="Room">
<input id="name" placeholder="Name">
<button onclick="join()">Join</button>
</div>

<div id="game" class="box" style="display:none">
<h2 id="team"></h2>
<p id="question"></p>
<div class="card" id="word"></div>
<button onclick="answer()">Correct!</button>
</div>

<script type="module">
import {db} from "./firebase.js";
import {ref,set,onValue,runTransaction} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

let room,name,team;

window.join=async()=>{
room=document.getElementById("room").value;
name=document.getElementById("name").value;
team=["A","B","C"][Math.floor(Math.random()*3)];

await set(ref(db,`rooms/${room}/players/${name}`),{name,team});

document.getElementById("game").style.display="block";
listen();
}

function listen(){
onValue(ref(db,`rooms/${room}/teams/${team}/progress`),p=>{
let n=p.val()||0;
onValue(ref(db,`rooms/${room}/questions/${n}`),q=>{
let data=q.val();
if(data){
document.getElementById("team").innerHTML="Team "+team;
document.getElementById("question").innerHTML="Definition: "+data.def;
document.getElementById("word").innerHTML=data.word;
}
});
});
}

window.answer=()=>{
runTransaction(
ref(db,`rooms/${room}/teams/${team}/progress`),
v=>(v||0)+1
);
}
</script>
</body></html>
